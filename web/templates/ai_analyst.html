<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 深度分析 · A股智能研报</title>
<style>
:root{
  --bg:#0a0f18; --card:#111827; --card2:#1a2332; --border:#1e2d40;
  --text:#c8d6e5; --dim:#5c6e82; --accent:#4dabf7; --green:#20c997;
  --red:#ff6b6b; --yellow:#fcc419; --purple:#a855f7; --orange:#ff922b;
  --bull-bg:rgba(32,201,151,.06); --bear-bg:rgba(255,107,107,.06);
  --agg-bg:rgba(255,107,107,.06); --con-bg:rgba(77,171,247,.06); --neu-bg:rgba(90,109,128,.06);
  --radius:12px; --radius-sm:8px; --radius-xs:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ===== Header ===== */
.header{background:rgba(17,24,39,.9);backdrop-filter:blur(12px);padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700}
.header h1 span{background:linear-gradient(90deg,#ff6b6b,#fcc419,#4dabf7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .nav{display:flex;gap:16px;font-size:12px}
.header .nav a{color:var(--dim);text-decoration:none;transition:color .2s;padding:6px 12px;border-radius:6px}
.header .nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
.header .nav a.active{color:var(--purple);font-weight:700}

/* ===== Wrap ===== */
.wrap{max-width:1440px;margin:0 auto;padding:20px 24px}
@media(max-width:768px){.wrap{padding:12px}}

/* ===== Input Row ===== */
.input-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px;
  padding:16px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:10px;color:var(--dim);letter-spacing:1px;font-weight:600}
.input-group input{padding:10px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);
  background:var(--card2);color:var(--text);font-size:14px;font-family:'Consolas',monospace;
  min-width:120px;outline:none;transition:border .2s}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(77,171,247,.1)}
.btn{padding:10px 22px;border-radius:var(--radius-xs);border:none;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.btn-start{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;box-shadow:0 4px 16px rgba(168,85,247,.25)}
.btn-start:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(168,85,247,.4)}
.btn-start:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-start.auto-trigger{animation:btnHint 2s ease-in-out infinite}
@keyframes btnHint{0%,100%{box-shadow:0 4px 16px rgba(168,85,247,.25)}50%{box-shadow:0 4px 28px rgba(168,85,247,.6)}}
.hint-tag{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px}

/* ===== Progress ===== */
.progress-section{margin-bottom:18px;display:none}
.steps{display:flex;gap:5px;flex-wrap:wrap}
.step{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 8px;text-align:center;transition:all .4s;
  position:relative;overflow:hidden}
.step .step-icon{font-size:18px;margin-bottom:2px;display:block;transition:transform .3s}
.step .step-label{font-size:9px;color:var(--dim);font-weight:600;letter-spacing:.5px}
.step.active{border-color:var(--accent);background:rgba(77,171,247,.06)}
.step.active .step-icon{transform:scale(1.15)}
.step.done{border-color:var(--green);background:rgba(32,201,151,.05)}
.step.done .step-icon{animation:popIn .4s ease}
@keyframes popIn{0%{transform:scale(.6)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.step .step-dot{position:absolute;bottom:0;left:0;height:2px;border-radius:0 2px 0 0;transition:width .5s ease;background:var(--accent)}
.step.done .step-dot{background:var(--green);width:100%}
.step.active .step-dot{width:40%;animation:dotPulse 1.5s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* ===== Main Layout ===== */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
@media(max-width:1200px){.main-grid{grid-template-columns:1fr}}

/* ===== Report Panel ===== */
.report-panel{display:flex;flex-direction:column;gap:10px}

/* Block Card */
.block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:all .35s;animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.block-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .2s}
.block-header:hover{background:rgba(255,255,255,.02)}
.block-icon{font-size:20px;line-height:1}
.block-title{font-size:13px;font-weight:700;flex:1;color:#e0e7f0}
.block-status{font-size:9px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.5px}
.st-pending{background:rgba(92,110,130,.12);color:var(--dim)}
.st-running{background:rgba(77,171,247,.12);color:var(--accent);animation:statusPulse 1.5s ease-in-out infinite}
.st-done{background:rgba(32,201,151,.1);color:var(--green)}
.st-error{background:rgba(255,107,107,.1);color:var(--red)}
@keyframes statusPulse{0%,100%{opacity:.7}50%{opacity:1}}
.block-arrow{font-size:13px;color:var(--dim);transition:transform .3s}
.block.open .block-arrow{transform:rotate(180deg)}
.block-body{max-height:0;overflow:hidden;transition:max-height .45s ease}
.block.open .block-body{max-height:8000px;overflow-y:auto}

.block-content{padding:0 16px 16px;font-size:12px;line-height:1.75;color:var(--text)}
.block-content h1,.block-content h2,.block-content h3{color:#e8eef5;font-size:13px;margin:10px 0 6px}
.block-content b,.block-content strong{color:var(--yellow);font-weight:600}
.block-content ul,.block-content ol{padding-left:20px;margin:4px 0}
.block-content li{margin:2px 0}
.typing-cursor{display:inline-block;width:2px;height:14px;background:var(--accent);animation:blink .8s step-end infinite;vertical-align:text-bottom;margin-left:1px}
@keyframes blink{50%{opacity:0}}

/* ===== Debate / Risk Bubble Chat ===== */
.bubble-thread{display:flex;flex-direction:column;gap:2px;padding:0 4px}
.bubble-row{display:flex;gap:10px;margin:6px 0;animation:bubbleIn .4s ease}
.bubble-row.bull,.bubble-row.conservative{flex-direction:row}
.bubble-row.bear,.bubble-row.aggressive{flex-direction:row-reverse}
.bubble-row.manager,.bubble-row.neutral{justify-content:center}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.bubble-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;border:2px solid transparent}
.bull .bubble-avatar{background:rgba(32,201,151,.12);border-color:rgba(32,201,151,.3)}
.bear .bubble-avatar{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.3)}
.aggressive .bubble-avatar{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.3)}
.conservative .bubble-avatar{background:rgba(77,171,247,.12);border-color:rgba(77,171,247,.3)}
.neutral .bubble-avatar{background:rgba(92,110,130,.12);border-color:rgba(92,110,130,.3)}
.manager .bubble-avatar{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.3)}

.bubble-card{max-width:88%;padding:10px 14px;border-radius:14px;font-size:11.5px;line-height:1.65}
.bull .bubble-card{background:var(--bull-bg);border:1px solid rgba(32,201,151,.15);border-bottom-left-radius:4px}
.bear .bubble-card{background:var(--bear-bg);border:1px solid rgba(255,107,107,.15);border-bottom-right-radius:4px}
.aggressive .bubble-card{background:var(--agg-bg);border:1px solid rgba(255,107,107,.15);border-bottom-right-radius:4px}
.conservative .bubble-card{background:var(--con-bg);border:1px solid rgba(77,171,247,.15);border-bottom-left-radius:4px}
.neutral .bubble-card{background:var(--neu-bg);border:1px solid rgba(92,110,130,.15);border-radius:14px;max-width:94%;text-align:center}
.manager .bubble-card{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-radius:14px;max-width:94%;text-align:center}

.bubble-role{font-size:10px;font-weight:700;margin-bottom:4px;letter-spacing:.3px}
.bull .bubble-role{color:var(--green)} .bear .bubble-role{color:var(--red)}
.aggressive .bubble-role{color:var(--red)} .conservative .bubble-role{color:var(--accent)}
.neutral .bubble-role{color:var(--dim)} .manager .bubble-role{color:var(--purple)}
.bubble-text{white-space:pre-wrap;word-break:break-word}

/* Round Divider */
.round-div{text-align:center;margin:8px 0 4px;font-size:9px;color:var(--dim);letter-spacing:1.5px;
  display:flex;align-items:center;gap:10px}
.round-div::before,.round-div::after{content:'';flex:1;height:1px;background:var(--border);opacity:.5}

/* ===== Side Panel ===== */
.side-panel{display:flex;flex-direction:column;gap:14px;position:sticky;top:72px}
@media(max-width:1200px){.side-panel{position:static}}

.rating-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);
  padding:24px 18px;text-align:center;transition:all .6s}
.rating-label{font-size:9px;color:var(--dim);letter-spacing:3px;font-weight:700;margin-bottom:8px}
.rating-value{font-size:44px;font-weight:900;letter-spacing:2px;margin:4px 0;transition:color .5s}
.rating-value.Buy,.rating-value.Overweight{color:var(--green)}
.rating-value.Hold{color:var(--yellow)}
.rating-value.Underweight,.rating-value.Sell{color:var(--red)}
.rating-summary{font-size:11px;color:var(--dim);line-height:1.6}
.rating-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.rating-meta-item{background:var(--card2);border-radius:var(--radius-xs);padding:10px;font-size:10px}
.rm-label{color:var(--dim);font-size:8px;letter-spacing:.5px;margin-bottom:3px}
.rm-val{color:#e0e7f0;font-weight:700;font-size:12px}

.side-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.side-card .sc-title{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:10px;font-weight:700;
  display:flex;align-items:center;gap:6px}
.sc-debate{font-size:10.5px;line-height:1.55;max-height:220px;overflow-y:auto}
.sc-debate .bl{color:var(--green)} .sc-debate .br{color:var(--red)}

/* ===== History ===== */
.history-section{margin-top:28px;padding-top:18px;border-top:1px solid var(--border)}
.history-section h3{font-size:12px;color:var(--dim);margin-bottom:12px;letter-spacing:.5px}
.hist-table{width:100%;border-collapse:collapse;font-size:11px}
.hist-table th{text-align:left;padding:8px 10px;color:var(--dim);font-weight:700;font-size:9px;
  letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap}
.hist-table td{padding:8px 10px;border-bottom:1px solid rgba(30,45,64,.4);white-space:nowrap}
.hist-table tbody tr{cursor:pointer;transition:background .15s}
.hist-table tbody tr:hover{background:rgba(77,171,247,.04)}
.hist-table .h-rating{font-weight:700}

/* ===== Empty ===== */
.empty-state{text-align:center;padding:50px 20px;color:var(--dim)}
.empty-state .empty-icon{font-size:56px;margin-bottom:12px;opacity:.6}
.empty-state .empty-text{font-size:13px;line-height:1.6}

/* ===== Spinner ===== */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
code{background:rgba(77,171,247,.08);color:var(--accent);padding:1px 5px;border-radius:3px;font-size:10px}

/* ===== Modern Table ===== */
.block-content table{width:100%;border-collapse:separate;border-spacing:0;margin:10px 0 14px;
  font-size:11px;border-radius:var(--radius-xs);overflow:hidden;border:1px solid var(--border)}
.block-content table thead th{background:rgba(77,171,247,.1);color:#e0e7f0;font-weight:700;
  font-size:10px;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:2px solid var(--accent)}
.block-content table tbody td{padding:8px 12px;border-bottom:1px solid rgba(30,45,64,.35);
  color:var(--text);vertical-align:top}
.block-content table tbody tr:last-child td{border-bottom:none}
.block-content table tbody tr:nth-child(even){background:rgba(255,255,255,.015)}
.block-content table tbody tr:hover{background:rgba(77,171,247,.04)}
.block-content table tbody td:first-child{color:#e0e7f0;font-weight:600}

/* ===== Key-Point Highlight ===== */
.block-content .highlight-box{background:rgba(77,171,247,.05);border-left:3px solid var(--accent);
  border-radius:0 var(--radius-xs) var(--radius-xs) 0;padding:10px 14px;margin:10px 0;font-size:11.5px;line-height:1.7}
.block-content .highlight-box.green{border-left-color:var(--green);background:rgba(32,201,151,.05)}
.block-content .highlight-box.red{border-left-color:var(--red);background:rgba(255,107,107,.05)}
.block-content .highlight-box.yellow{border-left-color:var(--yellow);background:rgba(252,196,25,.05)}
.block-content .highlight-box .hl-title{font-size:10px;font-weight:700;letter-spacing:1px;
  margin-bottom:4px;display:flex;align-items:center;gap:6px}
.block-content .highlight-box .hl-title.accent{color:var(--accent)}
.block-content .highlight-box .hl-title.green{color:var(--green)}
.block-content .highlight-box .hl-title.red{color:var(--red)}
.block-content .highlight-box .hl-title.yellow{color:var(--yellow)}

/* ===== Key-Value Pairs ===== */
.block-content .kv-row{display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:11.5px}
.block-content .kv-row .kv-key{color:var(--dim);font-size:10px;font-weight:600;min-width:60px;letter-spacing:.3px}
.block-content .kv-row .kv-val{color:#e0e7f0;font-weight:600}
.block-content .kv-row .kv-val.up{color:var(--green)}
.block-content .kv-row .kv-val.down{color:var(--red)}

/* ===== Inline Badge ===== */
.block-content .badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;
  font-weight:700;letter-spacing:.3px;margin:0 2px}
.block-content .badge.up{background:rgba(32,201,151,.12);color:var(--green)}
.block-content .badge.down{background:rgba(255,107,107,.12);color:var(--red)}
.block-content .badge.neutral{background:rgba(92,110,130,.12);color:var(--dim)}

/* ===== Separator ===== */
.block-content hr{border:none;height:1px;background:var(--border);margin:12px 0;opacity:.5}
</style>
</head>
<body>

<div class="header">
  <h1><span>AI 深度分析</span> · 多智能体研报</h1>
  <div class="nav">
    <a href="/">◂ 仪表盘</a>
    <a href="#" class="active">AI 深度分析</a>
  </div>
</div>

<div class="wrap">
  <!-- Input -->
  <div class="input-row">
    <div class="input-group">
      <label>股票代码</label>
      <input type="text" id="stockCode" placeholder="600519">
    </div>
    <div class="input-group">
      <label>分析日期</label>
      <input type="text" id="tradeDate" placeholder="2026-07-01">
    </div>
    <button class="btn btn-start" id="startBtn" onclick="startAnalysis()">
      <span id="btnIcon">🔍</span> <span id="btnText">开始深度分析</span>
    </button>
    <span id="statusHint" class="hint-tag"></span>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="steps" id="stepsBar"></div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Left: Report -->
    <div class="report-panel" id="reportPanel">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🤖</div>
        <div class="empty-text">输入股票代码，让 AI 多智能体为您深度分析</div>
        <div style="font-size:10px;color:var(--dim);margin-top:6px">分析师 → 多空辩论 → 交易决策 → 风控 → 最终决策</div>
      </div>
    </div>

    <!-- Right: Dashboard -->
    <div class="side-panel">
      <div class="rating-card" id="ratingCard" style="opacity:.3">
        <div class="rating-label">最终评级</div>
        <div class="rating-value" id="finalRating">--</div>
        <div class="rating-summary" id="finalSummary">等待分析完成...</div>
        <div class="rating-meta" id="finalMeta" style="display:none"></div>
      </div>
      <div class="side-card" id="debateCard" style="display:none">
        <div class="sc-title">⚔️ 多空辩论摘要</div>
        <div class="sc-debate" id="debateContent"></div>
      </div>
      <div class="side-card" id="traderCard" style="display:none">
        <div class="sc-title">💹 交易方案</div>
        <div id="traderContent" style="font-size:11px;line-height:1.6"></div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection">
    <h3>📋 历史分析记录</h3>
    <div style="overflow-x:auto">
    <table class="hist-table" id="historyTable">
      <thead><tr><th>时间</th><th>股票</th><th>代码</th><th>日期</th><th>评级</th><th>耗时</th></tr></thead>
      <tbody id="historyTbody"><tr><td colspan="6" style="text-align:center;color:var(--dim)">加载中...</td></tr></tbody>
    </table>
    </div>
  </div>
</div>

<script>
var STAGES = [
  {id:'market',label:'市场分析',icon:'📊',order:1},
  {id:'sentiment',label:'情绪分析',icon:'🎭',order:2},
  {id:'fundamentals',label:'基本面',icon:'📈',order:3},
  {id:'debate',label:'多空辩论',icon:'⚔️',order:4},
  {id:'trader',label:'交易决策',icon:'💹',order:5},
  {id:'risk',label:'风控辩论',icon:'🛡️',order:6},
  {id:'pm',label:'最终决策',icon:'🏛️',order:7},
];
var stageMap = {};
STAGES.forEach(function(s){ stageMap[s.id]=s; });

// ===== Rating Translation =====
var RATING_CN = {
  'Buy': '强烈推荐',
  'Overweight': '增持',
  'Hold': '持有',
  'Underweight': '减持',
  'Sell': '卖出'
};
function translateRating(r) { return RATING_CN[r] || r || '--'; }
// Rating CSS class → keep English for color mapping
var RATING_ORDER = ['Buy','Overweight','Hold','Underweight','Sell'];
function ratingClass(r) { return RATING_ORDER.indexOf(r)>=0 ? r : 'Hold'; }

var isAnalyzing = false;
var currentBubbleRole = {};  // per-stage bubble state
var bubbleContainers = {};   // per-stage bubble thread DOM

// Role → display config
var ROLE_CONFIG = {
  bull:       {label:'📈 多方研究员', css:'bull', icon:'🐂'},
  bear:       {label:'📉 空方研究员', css:'bear', icon:'🐻'},
  manager:    {label:'🏛️ 研究主管裁决', css:'manager', icon:'⚖️'},
  aggressive:{label:'🔥 激进分析师', css:'aggressive', icon:'🚀'},
  conservative:{label:'🛡️ 保守分析师', css:'conservative', icon:'🔒'},
  neutral:    {label:'⚖️ 中性分析师', css:'neutral', icon:'🎯'},
};

// ===== Init =====
(function init(){
  var d = new Date();
  document.getElementById('tradeDate').value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  var params = new URLSearchParams(window.location.search);
  var preCode = params.get('code');
  var preName = params.get('name');
  if (preCode) {
    document.getElementById('stockCode').value = preCode;
    var hint = document.getElementById('statusHint');
    hint.innerHTML = '📌 ' + (preName || preCode) + ' — 自动分析中';
    hint.style.color = 'var(--green)';
    // Auto-start after brief delay for UI render
    setTimeout(function(){ startAnalysis(); }, 600);
  }
  loadHistory();
})();

// ===== Step Progress =====
function buildSteps(){
  var html='';
  STAGES.forEach(function(s){
    html+='<div class="step" id="step-'+s.id+'">'+
      '<span class="step-icon">'+s.icon+'</span>'+
      '<span class="step-label">'+s.label+'</span>'+
      '<div class="step-dot"></div>'+
    '</div>';
  });
  document.getElementById('stepsBar').innerHTML=html;
  document.getElementById('progressSection').style.display='block';
}
function updateStep(stageId, status){
  var el=document.getElementById('step-'+stageId);
  if(!el)return;
  el.className='step '+status;
}

// ===== Report Blocks =====
function ensureBlock(stageId, label, icon){
  var id='block-'+stageId;
  if(document.getElementById(id)) return document.getElementById(id);
  var panel=document.getElementById('reportPanel');
  var empty=document.getElementById('emptyState');
  if(empty) empty.style.display='none';

  var block=document.createElement('div');
  block.className='block open';
  block.id=id;
  block.innerHTML=
    '<div class="block-header" onclick="this.parentElement.classList.toggle(\'open\')">'+
      '<span class="block-icon">'+icon+'</span>'+
      '<span class="block-title">'+label+'</span>'+
      '<span class="block-status st-pending" id="status-'+stageId+'">等待中</span>'+
      '<span class="block-arrow">▾</span>'+
    '</div>'+
    '<div class="block-body"><div class="block-content" id="content-'+stageId+'"></div></div>';
  panel.appendChild(block);
  return block;
}

function setBlockStatus(stageId, cls, text){
  var el=document.getElementById('status-'+stageId);
  if(!el)return;
  el.className='block-status '+cls;
  el.textContent=text;
}

// ===== Standard Content (non-debate stages) =====
function appendContent(stageId, text){
  var el=document.getElementById('content-'+stageId);
  if(!el)return;
  var cursor=el.querySelector('.typing-cursor');
  if(cursor)cursor.remove();
  // Streaming: inline markdown only (bold, code, newlines)
  el.innerHTML+=renderInlineMarkdown(text);
  el.innerHTML+='<span class="typing-cursor"></span>';
  var body=el.closest('.block-body');
  if(body) body.scrollTop=body.scrollHeight;
}
function finalizeContent(stageId, fullText){
  var el=document.getElementById('content-'+stageId);
  if(!el)return;
  var cursor=el.querySelector('.typing-cursor');
  if(cursor)cursor.remove();
  el.innerHTML=renderMarkdown(fullText);
}

// ===== Markdown Renderer =====
function renderInlineMarkdown(text){
  var s = escHtml(text);
  s = s.replace(/\n/g, '<br>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  return s;
}

function renderMarkdown(text){
  // Split into lines, process block elements (tables, headings, lists, highlight boxes)
  var lines = text.split('\n');
  var html = '';
  var inTable = false, tableHtml = '';
  var inList = false, listType = '';
  var i = 0;

  function flushTable(){
    if(tableHtml){
      // Split first row as header, rest as body
      var rows = tableHtml.match(/<tr>[\s\S]*?<\/tr>/g) || [];
      var theadHtml = rows.length>0 ? rows[0] : '';
      var tbodyHtml = rows.length>1 ? rows.slice(1).join('') : '';
      html += '<table><thead>' + theadHtml + '</thead>' + (tbodyHtml ? '<tbody>' + tbodyHtml + '</tbody>' : '') + '</table>';
      tableHtml = '';
    }
    inTable = false;
  }
  function flushList(){
    if(inList){
      html += (listType==='ol'?'</ol>':'</ul>');
      inList = false;
    }
  }

  while(i < lines.length){
    var line = lines[i];
    var trimmed = line.trim();

    // --- Highlight box: lines starting with "> " or "📌" ---
    if(/^(>|📌|🔴|🟢|🟡|⚠️|✅|❌|💡)\s/.test(trimmed)){
      flushTable(); flushList();
      var icon = trimmed.charAt(0)==='>' ? '💡' : trimmed.charAt(0);
      var content = trimmed.replace(/^[>📌🔴🟢🟡⚠️✅❌💡]\s*/, '');
      var css = '';
      if(trimmed.charAt(0)==='🟢'||trimmed.charAt(0)==='✅') css=' green';
      else if(trimmed.charAt(0)==='🔴'||trimmed.charAt(0)==='❌') css=' red';
      else if(trimmed.charAt(0)==='🟡'||trimmed.charAt(0)==='⚠️') css=' yellow';
      html += '<div class="highlight-box'+css+'"><div class="hl-title'+css+'">'+icon+'</div>'+renderInline(content)+'</div>';
      i++; continue;
    }

    // --- Table detection ---
    if(trimmed.indexOf('|')===0 && trimmed.lastIndexOf('|')===trimmed.length-1){
      if(!inTable){
        flushList();
        inTable = true;
        var cells = trimmed.split('|').filter(function(c){return c.trim()!=='';});
        // Check if next line is a separator row
        var nextLine = (i+1 < lines.length) ? lines[i+1].trim() : '';
        if(nextLine.indexOf('|')===0 && /^[\|\s\-:]+$/.test(nextLine.replace(/\|/g,'').trim())){
          // This is header row
          tableHtml += '<tr>' + cells.map(function(c){ return '<th>'+renderInline(c.trim())+'</th>'; }).join('') + '</tr>';
          i += 2; // skip header + separator
        } else {
          // Data row
          tableHtml += '<tr>' + cells.map(function(c){ return '<td>'+renderInline(c.trim())+'</td>'; }).join('') + '</tr>';
          i++;
        }
        continue;
      } else {
        // Already in table
        var cells = trimmed.split('|').filter(function(c){return c.trim()!=='';});
        // Check if this is a separator row
        if(/^[\|\s\-:]+$/.test(trimmed.replace(/\|/g,'').trim())){
          i++; continue; // skip separator
        }
        tableHtml += '<tr>' + cells.map(function(c){ return '<td>'+renderInline(c.trim())+'</td>'; }).join('') + '</tr>';
        i++; continue;
      }
    } else {
      if(inTable){
        flushTable();
      }
    }

    // --- Headings ---
    if(/^###\s/.test(trimmed)){
      flushList();
      html += '<h3>'+renderInline(trimmed.replace(/^###\s*/, ''))+'</h3>';
      i++; continue;
    }
    if(/^##\s/.test(trimmed)){
      flushList();
      html += '<h2>'+renderInline(trimmed.replace(/^##\s*/, ''))+'</h2>';
      i++; continue;
    }
    if(/^#\s/.test(trimmed)){
      flushList();
      html += '<h1>'+renderInline(trimmed.replace(/^#\s*/, ''))+'</h1>';
      i++; continue;
    }

    // --- Horizontal rule ---
    if(/^---+\s*$/.test(trimmed)){
      flushList();
      html += '<hr>';
      i++; continue;
    }

    // --- Unordered list ---
    if(/^[\-\*]\s/.test(trimmed)){
      flushTable();
      if(!inList || listType!=='ul'){ flushList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += '<li>'+renderInline(trimmed.replace(/^[\-\*]\s*/, ''))+'</li>';
      i++; continue;
    }

    // --- Ordered list ---
    var olMatch = trimmed.match(/^(\d+)\.\s/);
    if(olMatch){
      flushTable();
      if(!inList || listType!=='ol'){ flushList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += '<li>'+renderInline(trimmed.replace(/^\d+\.\s*/, ''))+'</li>';
      i++; continue;
    }

    // --- Key-Value pair: "**Key**: value" ---
    var kvMatch = trimmed.match(/^\*\*(.+?)\*\*\s*[:：]\s*(.+)$/);
    if(kvMatch){
      flushTable(); flushList();
      var valHtml = renderInline(kvMatch[2]);
      var valClass = '';
      var lowerVal = kvMatch[2].toLowerCase();
      if(/涨|升|增|多|牛|突破|金叉|向好|看多/.test(lowerVal)) valClass = ' up';
      else if(/跌|降|减|空|熊|破位|死叉|承压|看空/.test(lowerVal)) valClass = ' down';
      html += '<div class="kv-row"><span class="kv-key">'+escHtml(kvMatch[1])+'</span><span class="kv-val'+valClass+'">'+valHtml+'</span></div>';
      i++; continue;
    }

    // --- Paragraph ---
    if(trimmed !== ''){
      flushTable(); flushList();
      html += '<p>'+renderInline(trimmed)+'</p>';
    } else {
      flushTable(); flushList();
    }
    i++;
  }

  flushTable();
  flushList();
  return html;
}

function renderInline(text){
  var s = escHtml(text);
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Inline badges: ~~UP~~ / ~~DOWN~~
  s = s.replace(/~~UP~~/g, '<span class="badge up">▲</span>');
  s = s.replace(/~~DOWN~~/g, '<span class="badge down">▼</span>');
  return s;
}

// ===== Bubble Debate Content =====
function ensureBubbleThread(stageId){
  if (bubbleContainers[stageId]) return bubbleContainers[stageId];
  var contentEl = document.getElementById('content-'+stageId);
  if (!contentEl) return null;
  // Remove typing cursor
  var cursor = contentEl.querySelector('.typing-cursor');
  if (cursor) cursor.remove();
  var thread = document.createElement('div');
  thread.className = 'bubble-thread';
  thread.id = 'thread-'+stageId;
  contentEl.appendChild(thread);
  bubbleContainers[stageId] = thread;
  return thread;
}

function createBubble(stageId, role, headingText){
  var thread = ensureBubbleThread(stageId);
  if (!thread) return null;
  var cfg = ROLE_CONFIG[role] || {label:role, css:'neutral', icon:'💬'};

  // Add round divider for debate rounds
  if (headingText && (role==='bull' || role==='aggressive')) {
    var roundMatch = headingText.match(/第(\d+)轮/);
    if (roundMatch) {
      var div = document.createElement('div');
      div.className = 'round-div';
      div.textContent = '— 第 ' + roundMatch[1] + ' 轮 —';
      thread.appendChild(div);
    }
  }

  var row = document.createElement('div');
  row.className = 'bubble-row ' + cfg.css;

  var avatar = document.createElement('div');
  avatar.className = 'bubble-avatar';
  avatar.textContent = cfg.icon;

  var card = document.createElement('div');
  card.className = 'bubble-card';
  card.id = 'bubble-'+stageId+'-'+role+'-'+Date.now();

  var roleEl = document.createElement('div');
  roleEl.className = 'bubble-role';
  roleEl.textContent = (headingText && headingText.length < 40) ? headingText : cfg.label;

  var textEl = document.createElement('div');
  textEl.className = 'bubble-text';
  textEl.id = card.id + '-text';

  card.appendChild(roleEl);
  card.appendChild(textEl);
  row.appendChild(avatar);
  row.appendChild(card);
  thread.appendChild(row);

  // Scroll
  var body = thread.closest('.block-body');
  if (body) setTimeout(function(){ body.scrollTop = body.scrollHeight; }, 50);

  return textEl;
}

function appendBubbleText(stageId, role, text){
  // Clean leading newlines if this is the first chunk for this role
  text = text.replace(/^\n+/, '');
  var contentEl = document.getElementById('content-'+stageId);
  if (!contentEl) return;
  var thread = document.getElementById('thread-'+stageId);

  if (!thread) {
    // First bubble for this stage
    var cfg = ROLE_CONFIG[role] || {};
    var bubbleEl = createBubble(stageId, role, cfg.label || role);
    if (bubbleEl) bubbleEl.textContent += text;
  } else {
    // Find last bubble with matching role
    var rows = thread.querySelectorAll('.bubble-row.'+ROLE_CONFIG[role].css);
    var lastRow = rows[rows.length - 1];
    if (lastRow) {
      var textEl = lastRow.querySelector('.bubble-text');
      if (textEl) {
        textEl.textContent += text;
      }
    } else {
      // Role switched — create new bubble
      var cfg = ROLE_CONFIG[role] || {};
      var bubbleEl = createBubble(stageId, role, cfg.label || role);
      if (bubbleEl) bubbleEl.textContent += text;
    }
  }

  // Scroll
  if (thread) {
    var body = thread.closest('.block-body');
    if (body) body.scrollTop = body.scrollHeight;
  }

  // Update block status
  setBlockStatus(stageId, 'st-running', '运行中');
}

// ===== Start Analysis =====
function startAnalysis(){
  if(isAnalyzing) return;
  var code = document.getElementById('stockCode').value.trim();
  var date = document.getElementById('tradeDate').value.trim();
  if(!code){ alert('请输入股票代码'); return; }
  if(!date){ alert('请输入分析日期'); return; }

  isAnalyzing = true;
  var btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.classList.remove('auto-trigger');
  document.getElementById('btnIcon').textContent = '';
  document.getElementById('btnText').innerHTML = '<span class="spinner"></span> 分析中...';

  // Reset
  document.getElementById('reportPanel').innerHTML='';
  document.getElementById('finalRating').textContent='--';
  document.getElementById('finalRating').className='rating-value';
  document.getElementById('finalSummary').textContent='分析进行中...';
  document.getElementById('finalMeta').style.display='none';
  document.getElementById('debateCard').style.display='none';
  document.getElementById('traderCard').style.display='none';
  document.getElementById('ratingCard').style.opacity='1';
  document.getElementById('ratingCard').style.borderColor='var(--border)';
  currentBubbleRole = {};
  bubbleContainers = {};

  buildSteps();
  updateStep('market','active');

  var empty = document.getElementById('emptyState');
  if(empty) empty.style.display='none';

  fetch('/api/ai-analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({symbol:code,date:date,max_debate_rounds:1,max_risk_rounds:1})
  }).then(function(resp){
    var reader=resp.body.getReader();
    var decoder=new TextDecoder('utf-8'),buf='';
    function pump(){
      reader.read().then(function(r){
        if(r.done){ finish(); return; }
        buf+=decoder.decode(r.value,{stream:true});
        var lines=buf.split('\n');buf=lines.pop()||'';
        lines.forEach(function(line){
          if(line.indexOf('data: ')!==0)return;
          try{var d=JSON.parse(line.slice(6))}catch(e){return;}

          if(d.type==='stage_start'){
            var s=stageMap[d.stage];
            if(s){
              ensureBlock(d.stage, s.label, s.icon);
              setBlockStatus(d.stage, 'st-running', '运行中');
              updateStep(d.stage, 'active');
            }
          }
          else if(d.type==='stage_chunk'){
            var s=stageMap[d.stage];
            var isDebate = (d.stage==='debate' || d.stage==='risk');
            if(s){
              ensureBlock(d.stage, s.label, s.icon);
            }

            if (isDebate && d.role) {
              // Debate/Risk bubble mode — heading creates new bubble
              if (d.heading) {
                currentBubbleRole[d.stage] = d.role;
                // Role changed → will create new bubble on next text chunk
              }
              appendBubbleText(d.stage, d.role, d.text || '');
            } else if (isDebate && d.heading) {
              // Fallback: heading without role — try to detect from text
              var text = (d.text||'').replace(/^\n+/, '');
              if (text.indexOf('多方')>=0) currentBubbleRole[d.stage] = 'bull';
              else if (text.indexOf('空方')>=0) currentBubbleRole[d.stage] = 'bear';
              else if (text.indexOf('研究主管')>=0) currentBubbleRole[d.stage] = 'manager';
              else if (text.indexOf('激进')>=0) currentBubbleRole[d.stage] = 'aggressive';
              else if (text.indexOf('保守')>=0) currentBubbleRole[d.stage] = 'conservative';
              else if (text.indexOf('中性')>=0) currentBubbleRole[d.stage] = 'neutral';
            } else if (isDebate && currentBubbleRole[d.stage]) {
              // Text continuation for debate
              appendBubbleText(d.stage, currentBubbleRole[d.stage], d.text || '');
            } else {
              // Standard text content
              if (d.text) appendContent(d.stage, d.text);
            }
          }
          else if(d.type==='stage_done'){
            setBlockStatus(d.stage, 'st-done', '完成');
            updateStep(d.stage, 'done');

            var isDebate = (d.stage==='debate' || d.stage==='risk');
            if (isDebate && bubbleContainers[d.stage]) {
              // Bubble mode — finalize by removing cursor
              var thread = document.getElementById('thread-'+d.stage);
              if (!thread && d.report) {
                // Fallback: no bubbles created, use standard content
                finalizeContent(d.stage, d.report);
              }
            } else if (d.report) {
              finalizeContent(d.stage, d.report);
            }

            // Expand block
            var block = document.getElementById('block-'+d.stage);
            if(block) block.classList.add('open');

            // Side panel updates
            if(d.stage==='debate' && d.data){
              document.getElementById('debateCard').style.display='';
              var bull = d.data.bull_history || '';
              var bear = d.data.bear_history || '';
              var dh = '';
              if(bull) dh+='<div class="bl">📈 多方: '+escHtml(bull.substring(0,500))+'</div>';
              if(bear) dh+='<div class="br">📉 空方: '+escHtml(bear.substring(0,500))+'</div>';
              document.getElementById('debateContent').innerHTML = dh||'暂无数据';
              if(d.data.rating){
                document.getElementById('finalRating').textContent = translateRating(d.data.rating);
                document.getElementById('finalRating').className = 'rating-value '+ratingClass(d.data.rating);
              }
            }
            if(d.stage==='trader' && d.data){
              document.getElementById('traderCard').style.display='';
              var tc='';
              if(d.data.action) tc+='<b>方向:</b> <span style="color:'+(d.data.action==='Buy'?'var(--green)':d.data.action==='Sell'?'var(--red)':'var(--yellow)')+'">'+translateRating(d.data.action)+'</span><br>';
              if(d.data.entry_price) tc+='<b>入场:</b> ¥'+d.data.entry_price+'<br>';
              if(d.data.stop_loss) tc+='<b>止损:</b> ¥'+d.data.stop_loss+'<br>';
              document.getElementById('traderContent').innerHTML=tc||'暂无数据';
            }
          }
          else if(d.type==='all_done'){
            finalResult = d.result;
            updateStep('pm','done');
            var rating = finalResult.rating || 'Hold';
            var el = document.getElementById('finalRating');
            el.textContent = translateRating(rating);
            el.className = 'rating-value '+ratingClass(rating);
            document.getElementById('finalSummary').textContent = finalResult.summary || '';
            document.getElementById('ratingCard').style.borderColor =
              rating==='Buy'||rating==='Overweight'?'var(--green)':
              rating==='Sell'||rating==='Underweight'?'var(--red)':'var(--yellow)';

            var meta='';
            if(finalResult.price_target) meta+='<div class="rating-meta-item"><div class="rm-label">目标价</div><div class="rm-val">¥'+finalResult.price_target+'</div></div>';
            if(finalResult.time_horizon) meta+='<div class="rating-meta-item"><div class="rm-label">建议周期</div><div class="rm-val">'+finalResult.time_horizon+'</div></div>';
            if(finalResult.elapsed_seconds) meta+='<div class="rating-meta-item"><div class="rm-label">分析耗时</div><div class="rm-val">'+finalResult.elapsed_seconds.toFixed(1)+'s</div></div>';
            document.getElementById('finalMeta').innerHTML=meta;
            document.getElementById('finalMeta').style.display='';
            setTimeout(loadHistory,1500);
          }
          else if(d.type==='error'){
            alert('分析出错: '+d.msg);
          }
        });
        pump();
      }).catch(function(e){
        console.error(e);
      });
    }

    var finalResult = null;
    function finish(){
      isAnalyzing = false;
      var btn = document.getElementById('startBtn');
      btn.disabled = false;
      document.getElementById('btnIcon').textContent = '🔍';
      document.getElementById('btnText').textContent = '开始深度分析';
    }

    pump();
  }).catch(function(e){
    isAnalyzing = false;
    var btn = document.getElementById('startBtn');
    btn.disabled = false;
    document.getElementById('btnIcon').textContent = '🔍';
    document.getElementById('btnText').textContent = '开始深度分析';
    alert('请求失败: '+e);
  });
}

// ===== History =====
function loadHistory(){
  fetch('/api/ai-history?limit=20').then(function(r){return r.json()}).then(function(d){
    var tbody=document.getElementById('historyTbody');
    var rows=d.history||[];
    if(rows.length===0){
      tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--dim)">暂无分析记录</td></tr>';
      return;
    }
    var rcMap={Buy:'var(--green)',Overweight:'var(--green)',Hold:'var(--yellow)',Underweight:'var(--red)',Sell:'var(--red)'};
    tbody.innerHTML=rows.map(function(r){
      var rc=rcMap[r.rating]||'var(--text)';
      return '<tr onclick="loadReport(\''+r.id+'\')">'+
        '<td>'+escHtml(r.created_at||'')+'</td>'+
        '<td style="font-weight:600">'+escHtml(r.name||'')+'</td>'+
        '<td style="color:var(--dim)">'+escHtml(r.symbol||'')+'</td>'+
        '<td style="color:var(--dim)">'+escHtml(r.trade_date||'')+'</td>'+
        '<td><span class="h-rating" style="color:'+rc+'">'+translateRating(r.rating)+'</span></td>'+
        '<td style="color:var(--dim)">'+(r.elapsed_seconds?r.elapsed_seconds.toFixed(1)+'s':'--')+'</td>'+
      '</tr>';
    }).join('');
  }).catch(function(e){
    document.getElementById('historyTbody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--red)">加载失败</td></tr>';
  });
}

function loadReport(runId){
  window.open('/api/ai-report/'+runId,'_blank');
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
