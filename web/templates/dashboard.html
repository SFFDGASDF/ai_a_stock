<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A股策略仪表盘 v4</title>
<style>
:root{--bg:#0d1520;--card:#141e2a;--card2:#1a2838;--border:#233044;--text:#bcc8d6;--dim:#5a6d80;--accent:#48dbfb;--green:#00d2a0;--red:#ff6b6b;--yellow:#feca57;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#111d2b,#0a121c);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2d3e;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:700;letter-spacing:.5px}
.header h1 span{background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .status-bar{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--dim)}
.header .status-item{display:flex;align-items:center;gap:5px}
.header .ai-link-header{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:1px solid rgba(168,85,247,.35);background:rgba(168,85,247,.1);color:var(--purple);text-decoration:none;font-size:11px;font-weight:700;transition:all .25s}
.header .ai-link-header:hover{background:rgba(168,85,247,.2);border-color:var(--purple);box-shadow:0 0 16px rgba(168,85,247,.25)}

/* ---- 响应式布局 ---- */
.layout{display:grid;grid-template-columns:320px 1fr;gap:12px;padding:12px;min-height:calc(100vh - 48px)}
@media (max-width:1100px){.layout{grid-template-columns:1fr}}
@media (max-width:600px){.layout{padding:8px;gap:8px}.header{padding:8px 12px}.header h1{font-size:14px}}

/* ---- 左侧面板 ---- */
.left{display:flex;flex-direction:column;gap:10px;min-width:0}
@media (max-width:1100px){.left{gap:8px}}

/* 综合选股按钮 */
.all-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#00d2a0);color:#0d1520;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:1.5px;transition:all .3s;position:relative;overflow:hidden;font-family:inherit}
.all-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(72,219,251,.35)}
.all-btn:active{transform:scale(.98)}
.all-btn.running{animation:allGlow 1.2s ease-in-out infinite;pointer-events:none}
@keyframes allGlow{0%,100%{box-shadow:0 0 20px rgba(255,107,107,.4)}25%{box-shadow:0 0 25px rgba(254,202,87,.4)}50%{box-shadow:0 0 25px rgba(72,219,251,.4)}75%{box-shadow:0 0 20px rgba(0,210,160,.4)}}

/* 策略卡片网格 2x2 */
.strategy-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media (max-width:600px){.strategy-grid{grid-template-columns:1fr}}
.strategy-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px}
.strategy-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:0 0 3px 3px;transition:all .3s}
.strategy-card.card-momentum::before{background:var(--red)}
.strategy-card.card-oversold::before{background:var(--accent)}
.strategy-card.card-volume_price::before{background:var(--yellow)}
.strategy-card.card-breakout::before{background:var(--green)}
.strategy-card:hover{border-color:#3a5a7a;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.strategy-card.running{animation:cardGlow 1.5s ease-in-out infinite}
.strategy-card.running::before{height:4px}
@keyframes cardGlow{0%,100%{box-shadow:0 0 10px rgba(72,219,251,.15)}50%{box-shadow:0 0 22px rgba(72,219,251,.35)}}
.strategy-card .sc-top{display:flex;align-items:center;gap:8px}
.strategy-card .sc-icon{font-size:22px;line-height:1}
.strategy-card .sc-name{font-weight:700;font-size:13px;color:#fff}
.strategy-card .sc-desc{font-size:10px;color:var(--dim);margin-top:1px}
.strategy-card .sc-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:auto}
.strategy-card .sc-progress .sc-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%}
.sc-fill.fill-momentum{background:linear-gradient(90deg,#ff6b6b,#ff8a8a)}
.sc-fill.fill-oversold{background:linear-gradient(90deg,#48dbfb,#7ae0ff)}
.sc-fill.fill-volume_price{background:linear-gradient(90deg,#feca57,#ffe08a)}
.sc-fill.fill-breakout{background:linear-gradient(90deg,#00d2a0,#2effc2)}

/* 日志 */
.log-panel{flex:1;overflow-y:auto;font-family:'Consolas','Cascadia Code',monospace;font-size:10.5px;line-height:1.45;color:#6a7d90;min-height:150px;max-height:300px;background:rgba(0,0,0,.25);border-radius:10px;padding:10px;border:1px solid var(--border)}
@media (max-width:1100px){.log-panel{max-height:180px}}
.log-panel div{padding:1px 0;white-space:pre-wrap;word-break:break-all}
.log-panel .st{color:var(--yellow)}
.log-panel .ok{color:var(--green)}
.log-panel .err{color:var(--red)}
.log-panel .dim{color:var(--dim)}

/* ---- 右侧面板 ---- */
.right{display:flex;flex-direction:column;gap:10px;min-width:0;overflow:hidden}
@media (max-width:1100px){.right{gap:8px}}

/* 通用卡片 */
.card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:#3a5068;box-shadow:0 4px 20px rgba(0,0,0,.25)}
@media (max-width:600px){.card{padding:10px;border-radius:8px}}
.card-title{font-size:11px;font-weight:700;color:var(--dim);margin-bottom:10px;letter-spacing:1.5px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);opacity:.5}

/* K线动画 */
.chart-hero{display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;width:100%;flex-shrink:0;padding:8px 0 4px;transition:all .3s}
.chart-box{position:relative;width:540px;height:200px}
@media (max-width:800px){.chart-box{width:100%;height:160px}}
.chart-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(35,48,68,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(35,48,68,.25) 1px,transparent 1px);background-size:36px 36px;border-radius:4px}
.chart-glow{position:absolute;left:20%;right:30%;top:15%;bottom:25%;background:radial-gradient(ellipse,rgba(0,210,160,.06),transparent 70%);pointer-events:none;animation:glowBreath 3s ease-in-out infinite}
@keyframes glowBreath{0%,100%{opacity:.4}50%{opacity:1}}
.candles-wrap{position:absolute;left:24px;right:42px;bottom:28px;top:8px;display:flex;align-items:flex-end;justify-content:space-around}
.candle{display:flex;flex-direction:column;align-items:center;animation:candlePop .5s cubic-bezier(.34,1.56,.64,1) both}
.candle .wick{width:1px;flex-shrink:0;background:currentColor;border-radius:1px}
.candle .body{width:7px;border-radius:2px;min-height:3px;position:relative;transition:filter .3s}
.candle .body::after{content:'';position:absolute;inset:-2px -3px;border-radius:4px;opacity:0;transition:opacity .3s}
.candle:hover .body::after{opacity:.3}
.candle.up{color:var(--green)}.candle.up .body{background:var(--green)}.candle.up .body::after{background:var(--green)}
.candle.dn{color:var(--red)}.candle.dn .body{background:var(--red)}.candle.dn .body::after{background:var(--red)}
@keyframes candlePop{0%{opacity:0;transform:translateY(30px) scaleY(0)}60%{opacity:1;transform:translateY(-2px) scaleY(1.05)}100%{opacity:1;transform:translateY(0) scaleY(1)}}
.ma-line{position:absolute;left:24px;right:42px;bottom:28px;top:8px;pointer-events:none}
.ma-line svg{width:100%;height:100%}
.ma-line path{fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:800;stroke-dashoffset:800;animation:drawMA 1.8s .6s ease forwards;filter:drop-shadow(0 0 5px rgba(72,219,251,.6))}
@keyframes drawMA{to{stroke-dashoffset:0}}
.pulse-dot{position:absolute;width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 12px var(--accent);animation:dotTravel 4s ease-in-out infinite;pointer-events:none}
@keyframes dotTravel{0%{left:18%;top:70%}25%{left:35%;top:55%}50%{left:55%;top:43%}75%{left:75%;top:35%}100%{left:18%;top:70%}}
.price-ticker{position:absolute;right:6px;top:6px;font-family:'Consolas',monospace;font-size:20px;font-weight:700;display:flex;align-items:center;gap:4px}
@media (max-width:600px){.price-ticker{font-size:16px}}
.price-ticker .tick-num{color:var(--green);animation:priceGlow 2s ease-in-out infinite}
.price-ticker .tick-pct{font-size:11px;padding:2px 6px;border-radius:4px;background:rgba(0,210,160,.15);color:var(--green)}
@keyframes priceGlow{0%,100%{text-shadow:0 0 6px rgba(0,210,160,.3)}50%{text-shadow:0 0 18px rgba(0,210,160,.7)}}
.particle{position:absolute;font-family:'Consolas',monospace;font-size:9px;pointer-events:none;animation:floatUp 2.8s ease-out forwards;white-space:nowrap}
.particle.p-up{color:var(--green)}.particle.p-dn{color:var(--red)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:.6}100%{opacity:0;transform:translateY(-140px) scale(.4)}}
.hero-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.hero-desc{font-size:11px;color:var(--dim)}
.hero-meta{margin-top:10px;text-align:center}
.hero-score{font-size:24px;font-weight:700;margin-top:4px;transition:color .3s}
.chart-hero.hero-slim .chart-box{height:180px}
.chart-hero.hero-slim .hero-meta{margin-top:6px}
.candle-label{position:absolute;bottom:6px;left:30px;right:46px;display:flex;justify-content:space-around;font-size:8px;color:rgba(90,109,128,.4)}

/* 推荐卡片 */
.rec-card{background:linear-gradient(135deg,rgba(255,107,107,.12),rgba(254,202,87,.08),rgba(72,219,251,.06));border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:18px;margin-bottom:10px;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rec-card .rec-top{display:flex;justify-content:space-between;align-items:flex-start}
.rec-card .rec-name{font-size:22px;font-weight:700;color:#fff}
.rec-card .rec-code{font-size:12px;color:var(--dim)}
.rec-card .rec-price{font-size:32px;font-weight:700;color:var(--green);margin:6px 0;display:flex;align-items:baseline;gap:8px}
.rec-card .rec-chg{font-size:15px}
.rec-card .rec-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;margin-top:10px}
.rec-card .rec-metric{background:rgba(0,0,0,.25);padding:8px 10px;border-radius:6px;font-size:11px}
.rec-card .rec-metric label{color:var(--dim);display:block;font-size:9px;margin-bottom:2px}
.rec-card .rec-metric value{color:var(--text);font-weight:600}

/* 表格 */
.stock-table{width:100%;border-collapse:collapse;font-size:12px}
@media (max-width:600px){.stock-table{font-size:10px}}
.stock-table th{text-align:left;padding:7px 8px;color:var(--dim);font-weight:600;font-size:10px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--card);white-space:nowrap}
.stock-table td{padding:8px;border-bottom:1px solid rgba(35,48,68,.5);transition:background .15s}
.stock-table tbody tr{transition:all .2s}
.stock-table tbody tr:hover{background:rgba(72,219,251,.06);transform:scale(1.003)}
.stock-table tbody tr{cursor:pointer}
.up{color:var(--green)}.down{color:var(--red)}
.source-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(72,219,251,.12);margin-left:4px}
.tab-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:11px;transition:all .25s;font-weight:600;font-family:inherit}
.tab.active{background:rgba(72,219,251,.15);border-color:var(--accent);color:#fff}
.tab.all-tab{background:rgba(254,202,87,.1);border-color:var(--yellow);color:var(--yellow)}
.tab.all-tab.active{background:rgba(254,202,87,.25);color:#fff}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;background:var(--accent);color:#000;margin-left:4px;padding:0 5px}
.scroll-box{overflow-y:auto;overflow-x:auto;flex:1;min-height:0}

/* 操作按钮 */
.act-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:10px;transition:all .2s;font-family:inherit;white-space:nowrap}
.act-btn:hover{border-color:var(--accent);background:rgba(72,219,251,.08)}
.act-btn.ai-btn:hover{border-color:var(--purple);background:rgba(168,85,247,.1);color:var(--purple)}
.act-btn.chart-btn:hover{border-color:var(--accent);color:var(--accent)}

/* AI 评级徽章 */
.ai-rating-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;position:relative}
.ai-rating-badge:hover{transform:scale(1.08);box-shadow:0 2px 10px rgba(0,0,0,.3)}
.ai-rating-badge.Buy,.ai-rating-badge.Overweight{background:rgba(0,210,160,.15);color:var(--green);border:1px solid rgba(0,210,160,.3)}
.ai-rating-badge.Hold{background:rgba(254,202,87,.12);color:var(--yellow);border:1px solid rgba(254,202,87,.3)}
.ai-rating-badge.Underweight,.ai-rating-badge.Sell{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.ai-rating-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:10px;font-weight:400;color:var(--text);white-space:normal;max-width:240px;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.4);text-align:left;line-height:1.45;pointer-events:none}
.ai-rating-badge:hover .ai-rating-tooltip{display:block}
.ai-rating-none{color:var(--dim);font-size:10px}

/* AI 分析区块 */
.ai-section{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(99,102,241,.04));border:1px solid rgba(168,85,247,.25);border-radius:14px;padding:20px;margin-top:6px;animation:fadeIn .5s ease}
@media (max-width:600px){.ai-section{padding:14px}}
.ai-section .ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ai-section .ai-title{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.ai-section .ai-desc{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:12px}
.ai-stock-list{display:flex;flex-wrap:wrap;gap:8px}
.ai-stock-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:11px;transition:all .25s;font-family:inherit}
.ai-stock-btn:hover{border-color:var(--purple);background:rgba(168,85,247,.12);transform:translateY(-1px)}
.ai-stock-btn .ai-s-name{font-weight:700;color:#fff}
.ai-stock-btn .ai-s-code{color:var(--dim);font-size:10px}
.ai-stock-btn .ai-s-score{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;color:#000}

/* 绩效面板 */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.perf-stat{background:var(--card2);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center}
.perf-stat .ps-val{font-size:22px;font-weight:700;margin:4px 0}
.perf-stat .ps-label{font-size:10px;color:var(--dim)}
.perf-stat .ps-sub{font-size:10px;color:var(--dim);margin-top:2px}
.perf-bar-wrap{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin:4px 0}
.perf-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.factor-row{display:flex;align-items:center;padding:6px 8px;border-bottom:1px solid rgba(35,48,68,.3);font-size:11px}
.opt-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:11px;transition:all .2s;margin-right:6px;font-family:inherit}
.opt-btn:hover{background:#1e3044;border-color:var(--accent)}
.opt-btn.active-opt{background:rgba(72,219,251,.15);border-color:var(--accent);animation:glow 1.5s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(72,219,251,0)}50%{box-shadow:0 0 16px rgba(72,219,251,.25)}}
.sched-status{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--dim);padding:6px 0;flex-wrap:wrap}

/* 模态弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .35s cubic-bezier(.4,0,.2,1),visibility .35s}
.modal-overlay.show{opacity:1;visibility:visible;pointer-events:auto}
.modal-box{background:var(--card);border-radius:14px;border:1px solid var(--border);max-width:860px;width:92vw;max-height:92vh;overflow-y:auto;overflow-x:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);opacity:0;transform:translateY(28px) scale(.95);transition:opacity .4s cubic-bezier(.4,0,.2,1),transform .4s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show .modal-box{opacity:1;transform:translateY(0) scale(1)}
.modal-close{position:sticky;top:0;float:right;background:rgba(255,255,255,.08);border:none;color:var(--text);font-size:22px;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:10px 10px 0 0;transition:all .2s;z-index:1;font-family:inherit}
.modal-close:hover{background:rgba(255,107,107,.3);color:#fff}
.modal-content{padding:0 20px 20px}
.modal-title{font-size:18px;font-weight:700;color:#fff;padding:14px 20px 8px}
.modal-title .m-code{font-size:13px;color:var(--dim);margin-left:6px}
.modal-loader{display:flex;align-items:center;justify-content:center;min-height:300px}
.modal-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-chart-img{width:100%;border-radius:8px;opacity:0;transition:opacity .3s ease}
.modal-chart-img.loaded{opacity:1}
.modal-error{text-align:center;padding:40px;color:var(--red)}

/* ECharts */
.chart-container{width:100%;height:520px}
@media (max-width:600px){.chart-container{height:360px}}
.chart-toolbar{display:flex;align-items:center;gap:6px;padding:6px 0;flex-wrap:wrap}
.chart-toolbar .cycle-btn{padding:4px 12px;border-radius:4px;border:1px solid var(--border);background:var(--card2);color:var(--dim);cursor:pointer;font-size:11px;transition:all .2s;font-family:inherit}
.chart-toolbar .cycle-btn:hover{color:#fff;border-color:var(--accent)}
.chart-toolbar .cycle-btn.active{background:rgba(72,219,251,.2);border-color:var(--accent);color:#fff}
.chart-loading{display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--dim)}

/* 滚动条 */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<body>
<div class="header">
  <h1><span>A股量化策略实时仪表盘</span> <span style="font-size:11px;color:var(--dim);font-weight:400">v4</span></h1>
  <div class="status-bar">
    <a href="/ai" class="ai-link-header">&#x1f9e0; AI 深度分析</a>
    <div class="status-item">&#x1f4c5; <span id="clock">--</span></div>
    <div class="status-item" id="sysStatus">&#x25cf; 就绪</div>
  </div>
</div>

<div class="layout">
  <!-- 左侧控制面板 -->
  <div class="left">
    <!-- 综合选股 -->
    <button class="all-btn" id="allBtn" onclick="runAll()">
      &#x1f30d; 综合选股 · 四策略一键运行
    </button>

    <!-- 策略卡片 2x2 -->
    <div class="strategy-grid" id="strategyGrid"></div>

    <!-- 实时日志 -->

var ALL_ORDER = {{all_order|tojson}};

var activeKey = 'all';
var currentReader = null;
var isRunning = false;

// ---- 构建策略卡片 2x2 网格 ----

  var grid = document.getElementById('strategyGrid');

  activeKey = key;

function showResult(key) {
  var data = allResults[key];
  document.getElementById('perfPanel').style.display = 'none';

  }

    var cc = s.chg>=0?'up':'down';

        '<button class="act-btn ai-btn" onclick="event.stopPropagation();openAIAnalysis(\''+code+'\',\''+esc(name)+'\')" title="AI深度分析">&#x1f9e0; AI</button>'+

function fetchAIData(stocks) {

    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({codes: codes})
  }).then(function(r){ return r.json(); }).then(function(d){
    injectAIBadges(d.results || {});
  }).catch(function(){});
}

function injectAIBadges(aiData) {
  var ratingIcons = {Buy:'🟢', Overweight:'🟢', Hold:'🟡', Underweight:'🟠', Sell:'🔴'};
  Object.keys(aiData).forEach(function(code){
    var cell = document.getElementById('ai-col-'+code);
    if (!cell) return;
    var ai = aiData[code];
    var rating = ai.rating || '—';
    var icon = ratingIcons[rating] || '';
    var summary = ai.summary || '';
    var name = ai.name || '';
    var tradeDate = ai.trade_date || '';
    var runId = ai.run_id || '';
    // Truncate summary for tooltip
    var shortSummary = summary.length > 80 ? summary.substring(0,80)+'...' : summary;
    cell.innerHTML =
      '<a class="ai-rating-badge '+esc(rating)+'" href="/ai?code='+encodeURIComponent(code)+'&name='+encodeURIComponent(name)+'" target="_blank" onclick="event.stopPropagation()" title="点击查看完整AI分析">'+
        icon + ' ' + rating +
        (summary ? '<span class="ai-rating-tooltip"><b>'+esc(name||code)+'</b> '+esc(tradeDate)+'<br>'+esc(shortSummary)+'</span>' : '')+
      '</a>';
  });
}

// ---- 单策略 ----
function runSingle(key) {

// ---- SSE 流 ----
function startStream(url, callbacks) {
  callbacks = callbacks || {};
  fetch(url).then(function(resp){
    var reader = resp.body.getReader();
    currentReader = reader;
    var decoder = new TextDecoder('utf-8'), buf = '';
    function pump(){
      reader.read().then(function(r){
        if (r.done) { currentReader=null; return; }
        buf += decoder.decode(r.value, {stream:true});
        var lines = buf.split('\n'); buf = lines.pop()||'';
        lines.forEach(function(line){
          if (line.indexOf('data: ') !== 0) return;
          try { var d = JSON.parse(line.slice(6)); } catch(e) { return; }
          if (d.type === 'log' && callbacks.onLog) callbacks.onLog(d.line, d.progress);
          else if (d.type === 'done' && callbacks.onDone) callbacks.onDone(d.result);
          else if (d.type === 'error' && callbacks.onError) callbacks.onError(d.msg);
          else if (d.type === 'all_log' && callbacks.onLog) callbacks.onLog(d.line, d.progress, d.key);
          else if (d.type === 'strategy_done' && callbacks.onStrategyDone) callbacks.onStrategyDone(d.key, d.result);
          else if (d.type === 'all_done' && callbacks.onAllDone) callbacks.onAllDone(d.result);
        });
        pump();
      }).catch(function(e){
        if (callbacks.onError) callbacks.onError(String(e));
        currentReader = null; isRunning = false;
      });
    }
    pump();
  }).catch(function(e){
    if (callbacks.onError) callbacks.onError('fetch: '+String(e));
    isRunning = false;
  });
}

function addLog(text, cls) {

function switchKlinePeriod(period) {
  if (!klineCode) return;
  document.querySelectorAll('.cycle-btn').forEach(function(b){b.classList.remove('active')});
  var pBtn = document.querySelector('.cycle-btn[data-period="' + period + '"]');
  if (pBtn) pBtn.classList.add('active');
  klinePeriod = period;
  document.getElementById('chartContainer').style.display = 'none';
  document.getElementById('chartLoader').style.display = '';
  loadKlineData(klineCode, period);
}

function loadKlineData(code, period) {
  fetch('/api/kline/' + code + '?period=' + period).then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.error||'请求失败')});return r.json()})
    .then(function(data){
      document.getElementById('chartContainer').style.display = '';
      document.getElementById('chartLoader').style.display = 'none';
      renderKlineChart(data);
      if (klineChart) klineChart.resize();
      var info = document.getElementById('chartStockInfo');
      var chgColor = data.chg_pct >= 0 ? 'var(--green)' : 'var(--red)';
      info.innerHTML = '<span style="color:' + chgColor + '">' + (data.chg_pct>=0?'+':'') + data.chg_pct.toFixed(2) + '%</span>';
    }).catch(function(e){
      document.getElementById('chartLoader').style.display = 'none';
      document.getElementById('modalErr').style.display = '';
      document.getElementById('modalErr').textContent = '加载失败: ' + esc(e.message);
    });
}

function renderKlineChart(data) {
  var dom = document.getElementById('chartContainer');
  if (klineChart) { klineChart.dispose(); klineChart = null; }
  klineChart = echarts.init(dom, 'dark');
  var dates = data.dates;
  var upColor = '#ef4444', downColor = '#22c55e';
  if (data.period === 'minute') {
    var option = {
      backgroundColor: '#141e2a',
      grid: [{left:'8%',right:'5%',top:20,height:'52%'},{left:'8%',right:'5%',top:'78%',height:'16%'}],
      xAxis: [{type:'category',data:dates,axisLine:{lineStyle:{color:'#334'}},axisLabel:{fontSize:9,color:'#688'},gridIndex:0},
              {type:'category',data:dates,axisLine:{lineStyle:{color:'#334'}},axisLabel:{show:false},gridIndex:1}],
      yAxis: [{scale:true,splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'#688'},gridIndex:0},
              {scale:true,splitLine:{show:false},axisLabel:{color:'#688'},gridIndex:1}],
      dataZoom: [{type:'inside',xAxisIndex:[0,1]}],
      series: [
        {name:'价格',type:'line',data:data.close,smooth:true,symbol:'none',
         lineStyle:{color:'#48dbfb',width:1.5},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(72,219,251,.3)'},{offset:1,color:'rgba(72,219,251,0)'}])},xAxisIndex:0,yAxisIndex:0},
        {name:'MA5',type:'line',data:data.ma5,smooth:true,symbol:'none',lineStyle:{width:1,color:'#f59e0b'},xAxisIndex:0,yAxisIndex:0},
        {name:'MA10',type:'line',data:data.ma10,smooth:true,symbol:'none',lineStyle:{width:1,color:'#3b82f6'},xAxisIndex:0,yAxisIndex:0},
        {name:'量',type:'bar',data:data.volume,itemStyle:{color:'rgba(72,219,251,.3)'},xAxisIndex:1,yAxisIndex:1}
      ],
      tooltip:{trigger:'axis'},
    };
  } else {
    var ohlc = [];
    for (var i = 0; i < dates.length; i++) {
      ohlc.push([data.open[i], data.close[i], data.low[i], data.high[i]]);
    }
    var option = {
      backgroundColor: '#141e2a',
      tooltip: {trigger:'axis',axisPointer:{type:'cross'}},
      legend: {data:['K线','MA5','MA10','MA20','MA60'],bottom:0,textStyle:{color:'#688',fontSize:10}},
      grid: [
        {left:'8%',right:'5%',top:20,height:'42%'},
        {left:'8%',right:'5%',top:'55%',height:'10%'},
        {left:'8%',right:'5%',top:'70%',height:'12%'},
        {left:'8%',right:'5%',top:'86%',height:'10%'}
      ],
      xAxis: [
        {type:'category',data:dates,gridIndex:0,axisLine:{lineStyle:{color:'#334'}},axisLabel:{fontSize:9,color:'#688'}},
        {type:'category',data:dates,gridIndex:1,axisLabel:{show:false},axisLine:{lineStyle:{color:'#334'}}},
        {type:'category',data:dates,gridIndex:2,axisLabel:{show:false},axisLine:{lineStyle:{color:'#334'}}},
        {type:'category',data:dates,gridIndex:3,axisLabel:{fontSize:8,color:'#688'},axisLine:{lineStyle:{color:'#334'}}}
      ],
      yAxis: [
        {scale:true,splitArea:{show:true,areaStyle:{color:['rgba(255,255,255,.02)','rgba(255,255,255,.05)']}},splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'#688'},gridIndex:0},
        {scale:true,splitLine:{show:false},axisLabel:{show:false},gridIndex:1},
        {scale:true,splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'#688',fontSize:9},gridIndex:2},
        {scale:true,splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'#688',fontSize:8},min:0,max:100,gridIndex:3}
      ],
      dataZoom: [{type:'inside',xAxisIndex:[0,1,2,3]}],
      series: [
        {name:'K线',type:'candlestick',data:ohlc,xAxisIndex:0,yAxisIndex:0,
         itemStyle:{color:upColor,color0:downColor,borderColor:upColor,borderColor0:downColor}},
        {name:'MA5',type:'line',data:data.ma5,smooth:true,symbol:'none',lineStyle:{width:1,color:'#f59e0b'},xAxisIndex:0,yAxisIndex:0},
        {name:'MA10',type:'line',data:data.ma10,smooth:true,symbol:'none',lineStyle:{width:1,color:'#3b82f6'},xAxisIndex:0,yAxisIndex:0},
        {name:'MA20',type:'line',data:data.ma20,smooth:true,symbol:'none',lineStyle:{width:1,color:'#a855f7'},xAxisIndex:0,yAxisIndex:0},
        {name:'MA60',type:'line',data:data.ma60,smooth:true,symbol:'none',lineStyle:{width:1,color:'#ec4899'},xAxisIndex:0,yAxisIndex:0},
        {name:'成交量',type:'bar',data:data.volume,xAxisIndex:1,yAxisIndex:1,
         itemStyle:{color:function(p){var i=p.dataIndex;return data.close[i]>=data.open[i]?upColor:downColor},opacity:0.4}},
        {name:'MACD',type:'bar',data:data.macd_hist,xAxisIndex:2,yAxisIndex:2,
         itemStyle:{color:function(p){return data.macd_hist[p.dataIndex]>=0?upColor:downColor},opacity:0.7}},
        {name:'DIF',type:'line',data:data.dif,smooth:true,symbol:'none',lineStyle:{width:1,color:'#fff'},xAxisIndex:2,yAxisIndex:2},
        {name:'DEA',type:'line',data:data.dea,smooth:true,symbol:'none',lineStyle:{width:1,color:'#feca57'},xAxisIndex:2,yAxisIndex:2},
        {name:'RSI14',type:'line',data:data.rsi14,smooth:true,symbol:'none',lineStyle:{width:1,color:'#48dbfb'},xAxisIndex:3,yAxisIndex:3,
         markLine:{silent:true,data:[{yAxis:70,lineStyle:{color:'#ef4444',width:1,type:'dashed'}},{yAxis:30,lineStyle:{color:'#22c55e',width:1,type:'dashed'}}]}}
      ]
    };
  }
  klineChart.setOption(option);
  window.addEventListener('resize', function(){if(klineChart)klineChart.resize();});
}

function closeChartModal() {
  var modal = document.getElementById('chartModal');
  modal.classList.remove('show');
  setTimeout(function(){
    if (!modal.classList.contains('show') && klineChart) {
      klineChart.dispose(); klineChart = null;
      document.getElementById('chartContainer').style.display = 'none';
    }
  }, 450);
}

// ---- K线动画 ----
(function initChart(){
  var wrap = document.getElementById('candlesWrap');
  var labels = document.getElementById('candleLabel');
  if (!wrap || !labels) return;
  var count = 22;
  var html = '', lbls = '';
  for (var i = 0; i < count; i++) {
    var up = Math.random() > 0.32;
    var h = 20 + Math.random() * 130;
    var bodyH = 15 + Math.random() * (h - 10);
    var wickTop = (h - bodyH) * Math.random();
    var wickBot = h - bodyH - wickTop;
    var delay = i * 0.07;
    html += '<div class="candle '+(up?'up':'dn')+'" style="animation-delay:'+delay+'s">'+
      '<div class="wick" style="height:'+Math.max(wickTop,2)+'px"></div>'+
      '<div class="body" style="height:'+Math.max(bodyH,3)+'px"></div>'+
      '<div class="wick" style="height:'+Math.max(wickBot,0)+'px"></div></div>';
    if (i % 5 === 0) lbls += '<span>'+(i===0?'09:30':i===5?'10:00':i===10?'11:00':i===15?'13:30':i===20?'15:00':'')+'</span>';
    else lbls += '<span></span>';
  }
  wrap.innerHTML = html;
  labels.innerHTML = lbls;

  var basePrice = 3286.52 + Math.random() * 50 - 25;
  var tickNum = document.getElementById('tickNum');
  var tickPct = document.getElementById('tickPct');
  setInterval(function(){
    var change = (Math.random() - 0.45) * 8;
    basePrice += change;
    tickNum.textContent = basePrice.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    var pct = (change > 0 ? '+' : '') + (change * 0.03).toFixed(2) + '%';
    tickPct.textContent = pct;
    tickPct.style.background = change >= 0 ? 'rgba(0,210,160,.15)' : 'rgba(255,107,107,.15)';
    tickPct.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
    tickNum.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
  }, 2200);

  (function spawnParticle(){
    var box = document.getElementById('chartBox');
    if (!box) return;
    var el = document.createElement('span');
    var isUp = Math.random() > 0.4;
    var vals = ['+3.2%','+1.8%','-2.1%','+5.6%','-0.9%','+2.4%','+4.1%','-1.5%','+6.2%','-0.3%'];
    el.textContent = isUp ? vals.filter(function(v){return v[0]==='+'})[Math.floor(Math.random()*6)] : vals.filter(function(v){return v[0]==='-'})[Math.floor(Math.random()*3)];
    el.className = 'particle ' + (isUp ? 'p-up' : 'p-dn');
    el.style.left = (5 + Math.random() * 85) + '%';
    el.style.bottom = (10 + Math.random() * 40) + '%';
    el.style.animationDuration = (2 + Math.random() * 2.5) + 's';
    box.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 3000);
    setTimeout(spawnParticle, 1800 + Math.random() * 2000);
  })();
})();

// ---- 时钟 ----
function tick(){
  var n = new Date();
  document.getElementById('clock').textContent = n.toLocaleDateString('zh-CN')+' '+n.toLocaleTimeString('zh-CN');
}
setInterval(tick,1000); tick();

// ---- 绩效面板 ----
var perfStratKey = 'all';

function showPerfPanel() {
  document.getElementById('stockTable').style.display = 'none';
  document.getElementById('perfPanel').style.display = '';
  document.getElementById('recCardWrap').style.display = 'none';
  document.getElementById('chartBox').style.display = 'none';
  document.getElementById('aiSection').style.display = 'none';
  loadPerfData();
  loadSchedStatus();
  var row = document.getElementById('perfDetail').parentNode.querySelector('.tab-row');
  row.innerHTML = '<button class="opt-btn active-opt" id="perfStratAll" onclick="switchPerfStrat(\'all\')">全部</button>';
  for (var ki = 0; ki < ALL_ORDER.length; ki++) {
    (function(k, s) {
      var b = document.createElement('button');
      b.className = 'opt-btn';
      b.id = 'perfStrat-' + k;
      b.innerHTML = s.icon + ' ' + s.name;
      b.onclick = function() { switchPerfStrat(k); };
      row.appendChild(b);
    })(ALL_ORDER[ki], STRATEGIES[ALL_ORDER[ki]]);
  }
}

function switchPerfStrat(key) {
  perfStratKey = key;
  var row = document.getElementById('perfDetail').parentNode.querySelector('.tab-row');
  row.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.remove('active-opt'); });
  var active = row.querySelector(key === 'all' ? '#perfStratAll' : '#perfStrat-' + key);
  if (active) active.classList.add('active-opt');
  loadPerfData();
}

function loadPerfData() {
  var url = perfStratKey === 'all' ? '/api/performance' : '/api/performance/' + perfStratKey;
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    if (d.error) { document.getElementById('perfSummary').innerHTML = '<div style="color:var(--red);text-align:center;padding:20px">' + esc(d.error) + '</div>'; return; }
    renderPerfSummary(d.stats || {});
    renderPerfRecent(d.recent || []);
  }).catch(function(e) {
    document.getElementById('perfSummary').innerHTML = '<div style="color:var(--red);text-align:center;padding:20px">加载失败: ' + esc(String(e)) + '</div>';
  });
}

function renderPerfSummary(stats) {
  var colors = {momentum: '#ff6b6b', oversold: '#48dbfb', volume_price: '#feca57', breakout: '#00d2a0'};
  var html = '<div class="perf-grid">';
  for (var k in stats) {
    if (!ALL_ORDER.includes(k) && k !== 'all') continue;
    var s = stats[k];
    var c = colors[k] || 'var(--accent)';
    var wr = s.winrate_1d || 0;
    var wrColor = wr >= 60 ? 'var(--green)' : wr >= 45 ? 'var(--yellow)' : 'var(--red)';
    var name = STRATEGIES[k] ? STRATEGIES[k].icon + ' ' + STRATEGIES[k].name : k;
    html += '<div class="perf-stat">' +
      '<div class="ps-label">' + name + '</div>' +
      '<div class="ps-val" style="color:' + c + '">' + (s.total_picks || 0) + '<span style="font-size:10px;color:var(--dim)"> 次</span></div>' +
      '<div class="ps-sub">T+1胜率 <b style="color:' + wrColor + '">' + wr + '%</b></div>' +
      '<div class="ps-sub">T+3胜率 <b>' + (s.winrate_3d || 0) + '%</b> | T+5胜率 <b>' + (s.winrate_5d || 0) + '%</b></div>' +
      '<div style="margin-top:6px;font-size:9px;color:var(--dim)">' +
        '平均T+1: ' + (s.avg_ret_1d||0).toFixed(2) + '% | T+3: ' + (s.avg_ret_3d||0).toFixed(2) + '% | T+5: ' + (s.avg_ret_5d||0).toFixed(2) + '%<br>' +
        '盈亏比: ' + (s.profit_loss_ratio||0).toFixed(2) + (s.max_ret_5d ? ' | 最佳+5日: ' + s.max_ret_5d.toFixed(1) + '%' : '') +
      '</div>' +
    '</div>';
  }
  if (Object.keys(stats).length === 0) html += '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--dim)">暂无绩效数据，运行策略并等待追踪后查看</div>';
  html += '</div>';
  document.getElementById('perfSummary').innerHTML = html;
  if (perfStratKey !== 'all') { loadFactorAnalysis(perfStratKey); }
  else { document.getElementById('perfDetail').innerHTML = ''; }
}

function loadFactorAnalysis(key) {
  fetch('/api/factors/' + key).then(function(r) { return r.json(); }).then(function(d) {
    if (d.error) return;
    var ic = d.ic_analysis || [];
    var html = '<div style="font-weight:700;font-size:12px;margin:8px 0 4px">因子IC分析 (' + (ic.length||0) + '样本)</div>';
    if (ic.length === 0) {
      html += '<div style="color:var(--dim);font-size:10px">数据不足，运行更多策略后自动分析</div>';
    } else {
      for (var i = 0; i < Math.min(ic.length, 10); i++) {
        var f = ic[i];
        var icColor = Math.abs(f.ic_1d) > 0.05 ? (f.ic_1d > 0 ? 'var(--green)' : 'var(--red)') : 'var(--dim)';
        var barW = Math.min(100, Math.abs(f.ic_1d) * 500);
        html += '<div class="factor-row">' +
          '<span class="f-name">' + f.factor + '</span>' +
          '<div class="perf-bar-wrap" style="flex:1;margin:0 8px"><div class="perf-bar-fill" style="width:' + barW + '%;background:' + icColor + '"></div></div>' +
          '<span class="f-ic" style="color:' + icColor + '">IC=' + f.ic_1d.toFixed(3) + '</span>' +
          '<span style="font-size:9px;color:var(--dim);width:30px;text-align:right">' + (f.significant ? '*' : '') + '</span>' +
        '</div>';
      }
    }
    document.getElementById('perfDetail').innerHTML = html;
  }).catch(function(){});
}

function renderPerfRecent(recents) {
  var html = '<div style="font-weight:700;font-size:12px;margin:8px 0 4px">最近选股表现</div>';
  if (!recents || recents.length === 0) {
    html += '<div style="color:var(--dim);font-size:10px">暂无数据</div>';
  } else {
    html += '<table class="stock-table"><thead><tr><th>日期</th><th>策略</th><th>代码</th><th>名称</th><th>买入价</th><th>评分</th><th>T+1</th><th>T+3</th><th>T+5</th></tr></thead><tbody>';
    for (var i = 0; i < Math.min(recents.length, 20); i++) {
      var r = recents[i];
      var c1 = (r.ret_1d || 0) >= 0 ? 'up' : 'down';
      var c3 = (r.ret_3d || 0) >= 0 ? 'up' : 'down';
      var c5 = (r.ret_5d || 0) >= 0 ? 'up' : 'down';
      var sn = r.strategy_key ? (STRATEGIES[r.strategy_key] ? STRATEGIES[r.strategy_key].icon : r.strategy_key) : '-';
      html += '<tr><td>' + r.run_date + '</td><td>' + sn + '</td><td>' + r.code + '</td><td>' + esc(r.name||'') + '</td>' +
        '<td>' + (r.pick_price ? r.pick_price.toFixed(2) : '-') + '</td><td>' + (r.score||'-') + '</td>' +
        '<td class="' + c1 + '">' + (r.ret_1d != null ? (r.ret_1d >= 0 ? '+' : '') + r.ret_1d.toFixed(1) + '%' : '-') + '</td>' +
        '<td class="' + c3 + '">' + (r.ret_3d != null ? (r.ret_3d >= 0 ? '+' : '') + r.ret_3d.toFixed(1) + '%' : '-') + '</td>' +
        '<td class="' + c5 + '">' + (r.ret_5d != null ? (r.ret_5d >= 0 ? '+' : '') + r.ret_5d.toFixed(1) + '%' : '-') + '</td></tr>';
    }
    html += '</tbody></table>';
  }
  document.getElementById('perfRecents').innerHTML = html;
}

function loadSchedStatus() {
  fetch('/api/scheduler/status').then(function(r) { return r.json(); }).then(function(d) {
    document.getElementById('schedRunning').textContent = d.running ? '运行中' : '已停止';
    document.getElementById('schedRunning').style.color = d.running ? 'var(--green)' : 'var(--red)';
    document.getElementById('schedLastCheck').textContent = d.last_check || '--';
    document.getElementById('schedLastOpt').textContent = d.last_optimize || '--';
  }).catch(function(){});
}

function checkPerfNow() {
  fetch('/api/scheduler/check-now').then(function() {
    setTimeout(loadPerfData, 3000);
    setTimeout(loadSchedStatus, 3000);
  });
}

function optimizeNow() {
  var url = perfStratKey === 'all' ? '/api/optimize-all' : '/api/optimize/' + perfStratKey;
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    var msg = perfStratKey === 'all'
      ? '优化完成: ' + Object.keys(d).filter(function(k) { return !d[k].error; }).length + '/' + Object.keys(d).length + ' 个策略'
      : (d.error || d.message || '优化完成:' + JSON.stringify(d.changes||d));
    alert(msg);
    loadPerfData();
    loadSchedStatus();
  }).catch(function(e) { alert('优化失败: ' + e); });
}
</script>
<!-- 模态弹窗 - ECharts 交互式K线 -->
<div class="modal-overlay" id="chartModal" onclick="if(event.target===this)closeChartModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeChartModal()">&times;</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-content">
      <div class="chart-toolbar">
        <button class="cycle-btn" data-period="minute" onclick="switchKlinePeriod('minute')">分时</button>
        <button class="cycle-btn active" data-period="day" onclick="switchKlinePeriod('day')">日K</button>
        <button class="cycle-btn" data-period="week" onclick="switchKlinePeriod('week')">周K</button>
        <button class="cycle-btn" data-period="month" onclick="switchKlinePeriod('month')">月K</button>
        <span style="flex:1"></span>
        <span id="chartStockInfo" style="font-size:12px;color:var(--text)"></span>
      </div>
      <div class="chart-loading" id="chartLoader"><div class="modal-spinner"></div></div>
      <div class="chart-container" id="chartContainer" style="display:none"></div>
      <div class="modal-error" id="modalErr" style="display:none"></div>
    </div>
  </div>
</div>
